appId: com.digitalmuseum.app
productName: Digital Museum

directories:
  app: electron
  output: dist/electron

win:
  target: nsis
  icon: electron/build/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: electron/build/icon.ico
  uninstallerIcon: electron/build/icon.ico

# Files included from electron/ in the ASAR
files:
  - main.js
  - preload.js
  - loading.html
  - package.json

# Extra files bundled alongside the ASAR as real filesystem files.
# pg_ctl.exe and friends must be directly executable (cannot live inside ASAR).
extraResources:
  - from: bin/digitalmuseum.exe
    to: bin/digitalmuseum.exe
  - from: bin/postgres/pgsql
    to: bin/postgres/pgsql
    filter:
      - "**/*"
  - from: templates
    to: templates
    filter:
      - "**/*"
  - from: static
    to: static
    filter:
      - "**/*"
  - from: electron/.env.defaults
    to: .env.defaults

asar: true
